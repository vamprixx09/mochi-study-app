<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>Mochi // Study ⋆°｡🕊️</title>
    
    <!-- PWA Primary Meta Tags -->
    <meta name="theme-color" content="#ffffff" />
    <meta name="description" content="Your aesthetic AI study companion for focus, flashcards, and fun. 🍡" />
    <link rel="manifest" href="/manifest.json" />
    
    <!-- iOS Support -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Mochi Study" />
    <link rel="apple-touch-icon" href="/icon.png" />
    
    <!-- Android Support -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="application-name" content="Mochi Study" />
    <meta name="mobile-web-app-title" content="Mochi Study" />
    
    <link rel="icon" type="image/png" sizes="192x192" href="/icon.png" />
    <link rel="icon" type="image/png" sizes="512x512" href="/icon-512.png" />
    <link rel="shortcut icon" href="/icon.png" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js', { scope: '/' })
            .then(registration => {
              console.log('Mochi SW registered 🍡', registration.scope);
              
              // Force update if needed
              registration.onupdatefound = () => {
                const installingWorker = registration.installing;
                if (installingWorker) {
                  installingWorker.onstatechange = () => {
                    if (installingWorker.state === 'installed') {
                      if (navigator.serviceWorker.controller) {
                        console.log('New content available; please refresh.');
                      }
                    }
                  };
                }
              };
            })
            .catch(error => {
              console.log('Mochi SW registration failed:', error);
            });
        });

        // Listen for beforeinstallprompt event
        window.addEventListener('beforeinstallprompt', (e) => {
          // Stash the event so it can be triggered later.
          console.log('PWA is installable 🍡');
        });
      }
    </script>
  </body>
</html>
