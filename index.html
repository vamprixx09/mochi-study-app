<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>Mochi // Study ⋆°｡🕊️</title>
    
    <!-- PWA Primary Meta Tags -->
    <meta name="theme-color" content="#ffffff" />
    <meta name="description" content="Your aesthetic AI study companion for focus, flashcards, and fun. 🍡" />
    <link rel="manifest" href="/manifest.json" />
    
    <!-- iOS Support -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Mochi Study" />
    <link rel="apple-touch-icon" href="https://drive.google.com/uc?id=1QskuwmZXGoTYGqicXnZkj29qjA_hKKg7" />
    
    <!-- Android Support -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="application-name" content="Mochi Study" />

    
    <link rel="icon" type="image/png" sizes="192x192" href="https://drive.google.com/uc?id=1QskuwmZXGoTYGqicXnZkj29qjA_hKKg7" />
    <link rel="icon" type="image/png" sizes="512x512" href="https://drive.google.com/uc?id=1QskuwmZXGoTYGqicXnZkj29qjA_hKKg7" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js')
            .then(registration => {
              console.log('Service Worker registered with scope:', registration.scope);
            })
            .catch(error => {
              console.log('Service Worker registration failed:', error);
            });
        });
      }
    </script>
  </body>
</html>
